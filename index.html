<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FairCoin Explorer | Real-Time FairCoin Blockchain Analytics</title>
    <meta name="description" content="Search the FairCoin blockchain in real time. Track blocks, transactions, addresses, masternodes, fees, mempool activity, supply, price, bridge reserves, peers, and network health from one fast Explorer." />
    <meta name="keywords" content="FairCoin Explorer, FairCoin blockchain explorer, FAIR blockchain, FairCoin transactions, FairCoin blocks, FairCoin addresses, FairCoin masternodes, FairCoin mempool, FairCoin fees, FairCoin network status, WFAIR bridge, cryptocurrency analytics" />
    <meta name="author" content="FairCoin Team" />
    <meta name="creator" content="FairCoin Team" />
    <meta name="publisher" content="FairCoin Team" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://explorer.fairco.in/" />

    <meta name="application-name" content="FairCoin Explorer" />
    <meta name="apple-itunes-app" content="app-argument=https://explorer.fairco.in/" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FairCoin Explorer" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <meta name="theme-color" content="#0f0f23" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/images/FairCoin-Logo.jpg" />
    <link rel="shortcut icon" href="/images/FairCoin-Logo.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- FOUC prevention: apply dark class before render -->
    <script>
      (function() {
        var theme = localStorage.getItem('faircoin-theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://explorer.fairco.in/" />
    <meta property="og:title" content="FairCoin Explorer | Real-Time FairCoin Blockchain Analytics" />
    <meta property="og:description" content="Search FairCoin blocks, transactions, addresses, masternodes, fees, mempool activity, bridge reserves, peers, and live network health." />
    <meta property="og:site_name" content="FairCoin Explorer" />
    <meta property="og:image" content="https://explorer.fairco.in/images/explorer-meta.svg" />
    <meta property="og:image:secure_url" content="https://explorer.fairco.in/images/explorer-meta.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="900" />
    <meta property="og:image:alt" content="FairCoin Explorer landscape with glowing blockchain nodes and the Explorer emblem at sunrise" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@faircoin" />
    <meta name="twitter:title" content="FairCoin Explorer | Real-Time FairCoin Blockchain Analytics" />
    <meta name="twitter:description" content="Search FairCoin blocks, transactions, addresses, masternodes, fees, mempool activity, bridge reserves, peers, and live network health." />
    <meta name="twitter:image" content="https://explorer.fairco.in/images/explorer-meta.svg" />
    <meta name="twitter:image:alt" content="FairCoin Explorer landscape with glowing blockchain nodes and the Explorer emblem at sunrise" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "@id": "https://explorer.fairco.in/#webapp",
        "name": "FairCoin Explorer",
        "alternateName": ["FairCoin Block Explorer", "FAIR Explorer"],
        "description": "Real-time FairCoin blockchain explorer for blocks, transactions, addresses, masternodes, fees, mempool activity, bridge reserves, peers, supply, price, and network health.",
        "url": "https://explorer.fairco.in/",
        "image": "https://explorer.fairco.in/images/explorer-meta.svg",
        "applicationCategory": ["FinanceApplication", "BlockchainExplorer"],
        "operatingSystem": "Web Browser",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "featureList": [
          "FairCoin block search",
          "Transaction lookup",
          "Address balances and history",
          "Masternode monitoring",
          "Mempool and fee analytics",
          "Network status and peer visibility",
          "WFAIR bridge reserve tracking"
        ],
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Organization", "name": "FairCoin Team", "url": "https://fairco.in" },
        "publisher": { "@type": "Organization", "name": "FairCoin Team", "url": "https://fairco.in" }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- macOS-style boot splash shown while JS loads -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#23260C;color:hsl(80,10%,90%);font-family:Inter,system-ui,sans-serif">
        <div style="display:flex;flex-direction:column;align-items:center">
          <img src="/images/FairCoin-Logo.jpg" alt="FairCoin" width="64" height="64" style="width:64px;height:64px;border-radius:14px;object-fit:cover" />
          <div style="width:140px;height:3px;margin-top:28px;border-radius:999px;background:rgba(161,242,80,0.15);overflow:hidden">
            <div style="width:40%;height:100%;border-radius:999px;background:#A1F250;animation:fcboot 1.1s ease-in-out infinite"></div>
          </div>
          <p style="margin:14px 0 0;font-size:12px;opacity:0.5;letter-spacing:0.02em">FairCoin Explorer</p>
        </div>
      </div>
      <style>@keyframes fcboot{0%{transform:translateX(-120%)}100%{transform:translateX(350%)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Unregister stale service workers to prevent caching issues -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
  </body>
</html>
