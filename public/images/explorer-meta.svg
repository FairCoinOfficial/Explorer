<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">FairCoin Explorer social preview</title>
  <desc id="desc">Painterly FairCoin Explorer landscape with glowing blockchain nodes and an EF monument at sunrise.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c77ca1"/>
      <stop offset="0.25" stop-color="#ff9b3d"/>
      <stop offset="0.48" stop-color="#ffd37b"/>
      <stop offset="0.65" stop-color="#3297d7"/>
      <stop offset="1" stop-color="#9bb6d6"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d8b3a"/>
      <stop offset="0.55" stop-color="#315f25"/>
      <stop offset="1" stop-color="#102716"/>
    </linearGradient>
    <radialGradient id="sun" cx="30%" cy="35%" r="35%">
      <stop offset="0" stop-color="#fff8c7"/>
      <stop offset="0.2" stop-color="#ffd257" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff7a2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="paint"><feTurbulence baseFrequency="0.018" numOctaves="5" seed="8" type="fractalNoise"/><feDisplacementMap in="SourceGraphic" scale="10"/></filter>
  </defs>
  <rect width="1600" height="520" fill="url(#sky)"/>
  <rect y="390" width="1600" height="510" fill="url(#field)"/>
  <circle cx="430" cy="315" r="170" fill="url(#sun)"/>
  <circle cx="450" cy="320" r="35" fill="#fff6b8" opacity="0.9"/>
  <g opacity="0.58" filter="url(#paint)">
    <path d="M0 355 C160 240 260 310 365 260 C500 185 560 330 725 250 C840 195 955 235 1065 315 L1065 520 L0 520 Z" fill="#73506e"/>
    <path d="M920 330 C1070 205 1180 260 1290 235 C1415 205 1490 295 1600 265 L1600 520 L920 520 Z" fill="#4d6f7d"/>
    <path d="M0 465 C255 392 360 455 540 410 C720 365 860 455 1045 395 C1240 330 1415 455 1600 390 L1600 520 L0 520 Z" fill="#6f9b4a"/>
  </g>
  <g stroke-linecap="round" filter="url(#glow)">
    <path d="M150 760 C320 655 470 690 640 615 C825 535 955 595 1130 530 C1285 475 1420 535 1540 500" fill="none" stroke="#9aff56" stroke-width="8" opacity="0.72"/>
    <path d="M230 560 C405 610 560 570 715 650 C930 760 1095 700 1320 745" fill="none" stroke="#ffd45c" stroke-width="7" opacity="0.62"/>
    <path d="M520 750 C650 655 690 540 800 478 C920 405 1025 420 1170 365" fill="none" stroke="#67ffe5" stroke-width="6" opacity="0.58"/>
  </g>
  <g fill="#5b4c32" stroke="#d4c28a" stroke-width="4">
    <circle cx="170" cy="760" r="82"/><circle cx="430" cy="600" r="58"/><circle cx="615" cy="695" r="64"/><circle cx="985" cy="665" r="70"/><circle cx="1225" cy="535" r="60"/><circle cx="1420" cy="760" r="86"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="170" cy="745" r="19" fill="#fff8bf"/><circle cx="430" cy="586" r="15" fill="#fff8bf"/><circle cx="615" cy="680" r="16" fill="#fff8bf"/><circle cx="985" cy="650" r="18" fill="#fff8bf"/><circle cx="1225" cy="520" r="15" fill="#fff8bf"/><circle cx="1420" cy="745" r="20" fill="#fff8bf"/>
  </g>
  <g transform="translate(650 100)">
    <circle cx="160" cy="245" r="205" fill="#171a17" stroke="#3c3c33" stroke-width="18"/>
    <circle cx="160" cy="245" r="190" fill="none" stroke="#8ca642" stroke-width="7" stroke-dasharray="10 16" opacity="0.75"/>
    <path d="M78 135 H250 L233 195 H145 L136 228 H222 L207 286 H121 L106 358 H33 Z" fill="#9be337"/>
    <path d="M275 132 H396 L380 194 H324 L312 238 H365 L350 297 H296 L280 358 H214 Z" fill="#f3eee3"/>
    <text x="160" y="520" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="72" font-weight="800" fill="#f7ffe9">Explorer</text>
    <text x="160" y="575" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700" fill="#a1f250" letter-spacing="4">FAIRCOIN BLOCKCHAIN</text>
